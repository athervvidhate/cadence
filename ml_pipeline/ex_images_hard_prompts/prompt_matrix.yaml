    language: en
    discharge_text: |
      PASADENA COMMUNITY HOSPITAL
      After-Visit Summary (CHF Discharge)
      Patient: Harold Nguyen    MRN: SYN-1001
      Discharge Date: 2026-04-24
      Primary Diagnosis: Acute on chronic systolic congestive heart failure

      DISCHARGE MEDICATIONS (TAKE AS DIRECTED):
      1. Furosemide 40 mg tablet - Take 1 tablet by mouth twice daily at 8:00 AM and 8:00 PM. Take with food.
      2. Lisinopril 10 mg tablet - Take 1 tablet by mouth once daily at 8:00 AM.
      3. Metoprolol Succinate ER 50 mg tablet - Take 1 tablet by mouth once daily at 8:00 AM. Do not crush.
      4. Spironolactone 25 mg tablet - Take 1 tablet by mouth once daily at 8:00 AM.
      5. Potassium Chloride ER 20 mEq tablet - Take 1 tablet by mouth once daily at 8:00 AM with breakfast.

      Self-care instructions: daily morning weight, low sodium diet (<2 g/day), fluid restriction 1.5 L/day.
