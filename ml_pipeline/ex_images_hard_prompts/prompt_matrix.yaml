      CEDARS-SINAI MEDICAL CENTER
      Advanced Heart Failure Service - Discharge Medication Reconciliation
      Patient: Robert Ellis    MRN: SYN-2044
      Admit: 2026-04-19    Discharge: 2026-04-24
      Final Diagnosis: Acute decompensated HFrEF, stage C

      ACTIVE MEDICATION LIST (START/CONTINUE):
      A. Sacubitril/Valsartan (Entresto) 49/51 mg tab - 1 tab PO BID (0900, 2100). HOLD if SBP <100.
      B. Torsemide 40 mg tab - 1 tab PO qAM (0800).
      C. Carvedilol 12.5 mg tab - 1 tab PO BID with meals (0900, 2100).
      D. Empagliflozin 10 mg tab - 1 tab PO daily (0800).
      E. Eplerenone 25 mg tab - 1 tab PO daily (0800).
      F. Hydralazine 25 mg tab - 1 tab PO TID (0800, 1400, 2000).
      G. Isosorbide Mononitrate ER 30 mg tab - 1 tab PO daily (0800).
      H. Digoxin 0.125 mg tab - 1 tab PO daily (0800). Hold for HR <60.
      I. Potassium Chloride ER 20 mEq tab - 1 tab PO daily (0800).
      J. Apixaban 5 mg tab - 1 tab PO BID (0900, 2100).
      K. Atorvastatin 40 mg tab - 1 tab PO qHS (2000).
      L. Pantoprazole 40 mg tab - 1 tab PO daily, 30 min before breakfast (0730).

      DISCONTINUE HOME MEDS: Lisinopril 10 mg daily; Metoprolol tartrate 25 mg BID; Ibuprofen 400 mg PRN.
