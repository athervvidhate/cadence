version: hard_real_photo_v1
covers_images_root: ml_pipeline/ex_images
total_targets: 30
base_prompt: |
  Generate a photorealistic smartphone photo of a printed single-page hospital discharge medication sheet.
  The result must look like a real photo taken by an elderly person at home, not a clean scan.
  Baseline constraints:
  - Camera distance roughly 0.9 to 1.4 meters so text appears smaller and less perfect.
  - Hand jitter causing slight motion blur and mild focus softness (still partly legible).
  - Page is off-center with at least one edge slightly cropped.
  - Uneven warm indoor lighting with local dark and bright regions.
  - Mild JPEG compression artifacts and subtle sensor noise.
  - Realistic domestic background context (table texture, pill box, glasses, or remote in frame edge).
  - Natural paper look (small wrinkles or slight curl), no perfect flat scan geometry.
  Keep all medical text semantically exact as provided in the document block.
  Do not add, remove, or alter medication names, doses, frequencies, or times.
variant_profiles:
  clean: |
    Difficulty profile: clean_hard
    - Mild off-axis tilt (about 8 to 14 degrees).
    - Page fills about 70 to 80 percent of frame (not perfectly close).
    - Slight blur and lower contrast than a scanner.
    - One soft corner shadow, but most lines remain recoverable.
  angled_phone: |
    Difficulty profile: angled_phone_hard
    - Strong perspective skew (about 20 to 32 degrees).
    - Shot from one side while standing; page fills about 55 to 68 percent of frame.
    - Far edge has slight blur and keystone distortion.
    - Dim room lighting plus a mild glare streak near top or side.
  noisy_shadow: |
    Difficulty profile: noisy_shadow_hard
    - Low-light capture with visible ISO grain and JPEG artifacts.
    - Broad soft shadow crosses part of the medication section.
    - Mild motion blur and slight defocus in lower half.
    - Uneven brightness with one small overexposed lamp-glare patch.
