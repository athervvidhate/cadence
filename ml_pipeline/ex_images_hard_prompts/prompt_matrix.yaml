      YOUR DAILY HEART FAILURE MEDICINES:
      - Bumetanide 1 mg tablet: Take 1 tablet at 7:00 AM and 1 tablet at 7:00 PM.
      - Losartan 25 mg tablet: Take 1 tablet at 8:00 AM.
      - Metoprolol Succinate ER 25 mg tablet: Take 1 tablet at 8:00 AM.
      - Dapagliflozin 10 mg tablet: Take 1 tablet at 8:00 AM.
